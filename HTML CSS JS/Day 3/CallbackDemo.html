    //-------------------------------------------

    // Callback function example
    function sayHello(callback) { // passing the reference of the callback function as an argument
      setTimeout(function() {
        console.log("Hello, World!");
        if (callback) {
          callback(); // calling to execute sayBye() after sayHello() is done
        }
      }, 6000);
    }

    function sayBye() {
      setTimeout(function() {
        console.log("Goodbye, World!");
      }, 1000);
    }

    sayHello(sayBye);
  </script>
