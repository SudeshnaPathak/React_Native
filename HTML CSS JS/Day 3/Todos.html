<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1>Todo</h1>

    <div class="d-flex gap-2">
      <input type="text" id="inputbox" class="form-control" placeholder="Enter a todo item">
      <button onclick="addTodo()" class="btn btn-primary p-3" style="width:150px">Add Todo</button>
    </div>

    <h2 class="m-5">Todo Items:</h2>

    <ul id="todoList" class="list-group mt-3"></ul>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="todos.js"></script>
</body>
</html>
