<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id = "users-list"></ul>
    <script>
        //Chain of promises
        // const res = fetch('https://jsonplaceholder.typicode.com/posts') //returns a promise
        // const data = res.then((response) => {
        //     console.log(response) //response is a stream, we need to convert it to json
        //     return response.json(); //to retrieve the data from the stream, we need to use the json() method which also returns a promise
        // });
        // const finalData = data.then((data) => console.log(data));
        
        var users = [];
        fetch('https://jsonplaceholder.typicode.com/users')
        .then((response) => response.json()) //returns a promise
        .then((data) => {
            users = data;
            console.log(users);
            const usersList = document.getElementById('users-list');
            users.forEach((user) => {
                const li = document.createElement('li');
                li.textContent = user.name;
                usersList.appendChild(li);
            });
        });

    </script>
</body>
</html>
