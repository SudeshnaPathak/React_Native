</head>
<body>
  <button onclick="bookCab()">Book Cab</button>

  <div id="selectors"></div>

  <script>
    // Find Cab
    // Select Cab
    // Cab Assigned
    // Cab Arrived
    // Start Ride
    // End Ride

    function createSelector(id, label) {
      let divElement = document.createElement("div");

      let labelElement = document.createElement("label");
      labelElement.innerText = label;

      let selectElement = document.createElement("select");
      selectElement.id = id;

      let trueOptionElement = document.createElement("option");
      trueOptionElement.value = "true";
      trueOptionElement.innerHTML = "True";

      let falseOptionElement = document.createElement("option");
      falseOptionElement.value = "false";
      falseOptionElement.innerHTML = "False";

      selectElement.appendChild(trueOptionElement);
      selectElement.appendChild(falseOptionElement);

      divElement.append(labelElement, selectElement);

      return divElement;
    }

    function bookCab() {
      let selectorsDiv=document.getElementById("selectors");
      let time = 5000;
      
      new Promise((resolve, reject) => {
        selectorsDiv.append(createSelector("findCab", "Find Cab"));
        setTimeout(() => {
          let value=document.getElementById("findCab").value === "true";
          
          if (value) {
            resolve("Cab Found");
          } else {
            reject("Cab not found");
          }
        }, time);
      }).then((message) => {
        console.log(message);
        return new Promise((resolve, reject) => {
          selectorsDiv.append(createSelector("selectCab", "Select Cab"));
          setTimeout(() => {
            let value=document.getElementById("selectCab").value === "true";
            
            if (value) {
              resolve("Cab Selected");
            } else {
              reject("Cab not selected");
            }
          }, time);
        });
      }).then((message) => {
        console.log(message);
        return new Promise((resolve, reject) => {
          selectorsDiv.append(createSelector("assignCab", "Assign Cab"));
          setTimeout(() => {
            let value=document.getElementById("assignCab").value === "true";
            
            if (value) {
              resolve("Cab Assigned");
            } else {
              reject("Cab not assigned");
            }
          }, time);
        });
      }).then((message) => {
        console.log(message);
        return new Promise((resolve, reject) => {
          selectorsDiv.append(createSelector("arriveCab", "Cab Arrived"));
          setTimeout(() => {
            let value=document.getElementById("arriveCab").value === "true";
            
            if (value) {
              resolve("Cab Arrived");
            } else {
              reject("Cab not arrived");
            }
          }, time);
        });
      }).then((message) => {
        console.log(message);
        return new Promise((resolve, reject) => {
          selectorsDiv.append(createSelector("startCab", "Cab Start"));
          setTimeout(() => {
            let value=document.getElementById("startCab").value === "true";
            
            if (value) {
              resolve("Cab Started");
            } else {
              reject("Cab not started");
            }
          }, time);
        });
      }).then((message) => {
        console.log(message);
        return new Promise((resolve, reject) => {
          selectorsDiv.append(createSelector("endCab", "Cab End"));
          setTimeout(() => {
            let value=document.getElementById("endCab").value === "true";
            
            if (value) {
              resolve("Cab Ended");
            } else {
              reject("Cab not ended");
            }
          }, time);
        });
      }).then((message) => {
        console.log(message);
      }).catch((error) => {
        console.log(error);
      })
    }
  </script>
