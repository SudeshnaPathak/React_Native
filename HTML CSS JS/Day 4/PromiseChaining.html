<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // Add item to wishlist
    // Add item to cart
    // Place order
    // Checkout
    // Go to payment gateway
    // Make payment
    // Order confirmed
    // Order packed
    // Order shipped
    // Order delivered

    let cartStatus = "added";
    let orderStatus = "placed";
    let checkoutStatus = "done";
    let paymentStatus = "done";
    let orderConfirmationStatus = "confirmed";
    let packingStatus = "packed";
    let shippingStatus = "shipped";
    let deliveryStatus = "delivered";

    let ecartpromise = new Promise((resolve, reject) => {
      setTimeout(() => {
        if (cartStatus === "added") {
          resolve("Item added to cart");
        } else {
          reject("Failed to add item to cart");
        }
      }, 2000);
    });

    ecartpromise.then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (orderStatus === "placed") {
            resolve("Order placed successfully");
          } else {
            reject("Failed to place order");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (checkoutStatus === "done") {
            resolve("Checkout completed");
          } else {
            reject("Failed to complete checkout");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (paymentStatus === "done") {
            resolve("Payment successful");
          } else {
            reject("Payment failed");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (orderConfirmationStatus === "confirmed") {
            resolve("Order confirmed");
          } else {
            reject("Order confirmation failed");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (packingStatus === "packed") {
            resolve("Order packed");
          } else {
            reject("Order packing failed");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (shippingStatus === "shipped") {
            resolve("Order shipped");
          } else {
            reject("Order shipping failed");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (deliveryStatus === "delivered") {
            resolve("Order delivered successfully");
          } else {
            reject("Order delivery failed");
          }
        }, 2000);
      });
    }).then((message) => {
      console.log(message);
    }).catch((error) => {
      console.log(error);
    });
  </script>
</body>
</html>
