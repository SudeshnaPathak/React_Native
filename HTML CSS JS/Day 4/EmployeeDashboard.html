<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center bg-primary text-white p-2">Employee Dashboard</h1>

    <div class="d-flex justify-content-between m-3">
      <h4>Total Employees: <span id="totalCount">0</span></h4>
      <h4 id="averageSalary">Average Salary: ₹ <span id="averageSalaryValue">0</span></h4>
      <h4 id="lowestSalary">Lowest Salary: ₹ <span id="lowestSalaryValue">0</span></h4>
      <h4 id="highestSalary">Highest Salary: ₹ <span id="highestSalaryValue">0</span></h4>
    </div>

    <div class="d-flex justify-content-start m-3">
      <select id="departmentFilter" class="form-select w-auto ms-2" onchange="filterEmployees()">
        <option value="">All Departments</option>
        <option value="HR">HR</option>
        <option value="Engineering">Engineering</option>
        <option value="Marketing">Marketing</option>
        <option value="Design">Design</option>
      </select>

      <button class="btn btn-danger ms-2" onclick="clearEmployees()">Clear Employees</button>
    </div>

    <div class="d-flex flex-wrap gap-3 m-3">
      <div class="card border rounded" style="flex: 1 1 48%; min-width: 280px;">
        <h2 class="text-center bg-secondary text-white p-2">Employee List</h2>
        <div id="employeeCardGroup" class="d-flex flex-wrap gap-3">

        </div>
      </div>

      <div class="card border rounded" style="flex: 1 1 48%; min-width: 280px;">
        <h2 class="text-center bg-secondary text-white p-2">Employee Details</h2>
        <div id="employeeDetailsCardGroup" class="d-flex flex-wrap gap-3">
          <div class="card border rounded m-2" style="width: 18rem;">
            <div class="card-body">
              <h5 class="card-title">Name: <span id="empDetailName"></span></h5>
              <p class="card-text">Department: <span id="empDetailDepartment"></span></p>
              <p class="card-text">Position: <span id="empDetailPosition"></span></p>
              <p class="card-text">Salary: ₹ <span id="empDetailSalary">0</span></p>
              <p class="card-text">Location: <span id="empDetailLocation"></span></p>
              <p class="card-text">Top Skills: <span id="empDetailSkills"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card border rounded m-3">
      <div class="card-body">
        <h2 class="card-title">Add Employee</h2>
        <div class="mb-3">

          <label for="employeeId" class="form-label">ID</label>
          <input type="text" class="form-control" id="employeeId">

          <label for="employeeName" class="form-label">Name</label>
          <input type="text" class="form-control" id="employeeName">

          <label for="employeeDepartment" class="form-label">Department</label>
          <select id="employeeDepartment" class="form-select" name="employeeDepartment">
            <option value="HR">HR</option>
            <option value="Engineering">Engineering</option>
            <option value="Marketing">Marketing</option>
            <option value="Design">Design</option>
          </select>

          <label for="employeePosition" class="form-label">Position</label>
          <input type="text" class="form-control" id="employeePosition">

          <label for="employeeSalary" class="form-label">Salary</label>
          <input type="number" class="form-control" id="employeeSalary">

          <label for="employeeLocation" class="form-label">Location</label>
          <input type="text" class="form-control" id="employeeLocation">

          <label for="employeeSkills" class="form-label">Skills</label>
          <input type="text" class="form-control" id="employeeSkills" placeholder="Comma separated skills">

          <div class="d-grid mt-3">
            <button class="btn btn-primary" onclick="addEmployee()">Add Employee</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="EmployeeDashboard.js"></script>
</body>
</html>
